<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0B" />
    <title>Offline · TitanOS</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #0a0a0b;
        color: #f5f5f5;
        padding: 1.5rem;
        text-align: center;
      }
      h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
      p { color: #a1a1aa; margin: 0 0 1.25rem; max-width: 28rem; line-height: 1.5; }
      button {
        background: #22d3ee;
        color: #000;
        border: 0;
        border-radius: 0.75rem;
        padding: 0.7rem 1.2rem;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>You&apos;re offline</h1>
      <p>TitanOS will reconnect when your network is back. Cached pages and local data still work for many tasks.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
